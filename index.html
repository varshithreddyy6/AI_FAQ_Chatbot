<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ReddyBOT - AI Assistant by Varshith Reddy" />
  <title>ReddyBOT</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="app" id="app">

    <div class="sidebar" id="sidebar">

      <div class="sidebar-header">
        <div class="brand">
          <div class="brand-icon">R</div>
          <div class="brand-text">
            <span class="brand-name">ReddyBOT</span>
            <span class="brand-sub">AI Assistant</span>
          </div>
        </div>
        <button class="sidebar-close" id="sidebarClose" title="Close sidebar">×</button>
      </div>

      <button id="newChatBtn" class="new-chat-btn">
        <span class="btn-icon">+</span>
        New Conversation
      </button>

      <div class="search-wrapper">
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Search conversations..."
          autocomplete="off"
        />
      </div>

      <div class="history-section">
        <span class="history-label">Recent Chats</span>
        <div id="historyList" class="history-list"></div>
      </div>

      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar">VR</div>
          <div class="user-details">
            <span class="user-name">Varshith Reddy</span>
          </div>
        </div>
      </div>

    </div>

    <div class="overlay" id="overlay"></div>

    <div class="main" id="main">

      <div class="topbar">
        <div class="topbar-left">
          <button class="menu-btn" id="menuBtn" title="Toggle sidebar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="6" x2="21" y2="6"/>
              <line x1="3" y1="12" x2="21" y2="12"/>
              <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <div class="topbar-info">
            <span class="topbar-title">ReddyBOT</span>
            <span class="status-dot"></span>
            <span class="topbar-status">Online</span>
          </div>
        </div>

        <div class="topbar-right">
          <button class="icon-btn" id="themeBtn" title="Toggle theme">
            <svg id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
          <button class="icon-btn" id="exportBtn" title="Export chat">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
          </button>
          <button class="icon-btn" id="clearBtn" title="Clear chat">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="chat-container" id="chatContainer"></div>

      <div class="input-area">
        <div class="input-wrapper">

          <button class="input-action-btn" id="voiceBtn" title="Voice input">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
          </button>

          <div class="textarea-wrapper">
            <textarea
              id="userInput"
              placeholder="Message ReddyBOT..."
              rows="1"
              maxlength="2000"
            ></textarea>
            <div class="char-counter" id="charCounter">0 / 2000</div>
          </div>

          <button id="sendBtn" class="send-btn" title="Send" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>

        <div class="input-footer">
          <span class="input-hint">Press Enter to send, Shift+Enter for new line</span>
        </div>
      </div>

    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
