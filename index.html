<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>AIFAQCHATBOT</title>

  <link
    rel="stylesheet"
    href="style.css"
  />

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

</head>

<body>

  <div class="app">

    <!-- SIDEBAR -->

    <div class="sidebar">

      <h2>
        AIFAQ CHATBOT
      </h2>

      <button id="newChatBtn">
        + New Chat
      </button>

      <div id="historyList"></div>

    </div>

    <!-- MAIN -->

    <div class="main">

      <!-- TOPBAR -->

      <div class="topbar">
        AI Assistant
      </div>

      <!-- CHAT -->

      <div
        class="chat-container"
        id="chatContainer"
      ></div>

      <!-- INPUT -->

      <div class="input-area">

        <div class="input-wrapper">

          <textarea
            id="userInput"
            placeholder="Message AI Assistant..."
          ></textarea>

          <button
            id="sendBtn"
            class="send-btn"
          >
            ➤
          </button>

        </div>

      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>

</html>
