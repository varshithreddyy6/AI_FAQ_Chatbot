<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>AI FAQ Chatbot</title>

    <link
        rel="stylesheet"
        href="style.css"
    />

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet"
    />

</head>

<body>

    <div class="app">

        <!-- SIDEBAR -->

        <div class="sidebar">

            <div class="logo">
                AI FAQ Chatbot
            </div>

            <div class="menu">

                <div class="menu-item">
                    New Chat
                </div>

                <div class="menu-item">
                    AI Assistant
                </div>

                <div class="menu-item">
                    FAQ Support
                </div>

                <div
                    class="menu-item"
                    onclick="clearChat()"
                >
                    Clear Chat
                </div>

            </div>

        </div>

        <!-- MAIN -->

        <div class="main">

            <div class="topbar">
                AI FAQ Chatbot
            </div>

            <!-- CHAT BOX -->

            <div id="chat-box">

                <div class="bot-message">

                    <div>
                        Hello 👋
                        <br><br>

                        I am your AI FAQ Chatbot.
                        <br>

                        Ask me anything about AI,
                        Machine Learning,
                        internships,
                        or technology.
                    </div>

                    <div class="time">
                        Online
                    </div>

                </div>

            </div>

            <!-- INPUT -->

            <div class="input-area">

                <input
                    type="text"
                    id="user-input"
                    placeholder="Ask anything..."
                />

                <button onclick="sendMessage()">
                    Send
                </button>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
